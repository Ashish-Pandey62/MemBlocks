# Example LoCoMo evaluation configuration
# Keep the defaults small for affordable smoke runs. Increase these limits for
# full evaluation runs.

runs:
  - name: "locomo-smoke"
    dataset:
      name: "locomo"
      max_sessions: 1
      max_questions_per_session: 2
    runner:
      name: "locomo"
      model: "stub-model"
      judge_model: "stub-judge"
    metrics:
      - "accuracy"
