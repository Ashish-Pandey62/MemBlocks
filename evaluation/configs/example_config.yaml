# Example evaluation configuration
# This demonstrates a multi-run configuration for evaluating different strategies

runs:
  - name: "baseline-semantic"
    dataset: "locomo-mc10"
    runner: "semantic-retriever"
    metrics:
      - "accuracy"
      - "latency"

  - name: "baseline-core"
    dataset: "locomo-mc10"
    runner: "core-retriever"
    metrics:
      - "accuracy"
      - "latency"

  - name: "hybrid-retrieval"
    dataset: "locomo-mc10"
    runner: "hybrid-retriever"
    metrics:
      - "accuracy"
      - "latency"
      - "context-usage"